<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Máquina de Doces</title>

  <!-- FONTES -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    <img src="assets/arcade.png" class="arcade-img">
    <h1 class="titulo">Máquina de Doces</h1>
  </div>

  <div class="machine">

    <h2 class="subtitulo">Escolha seu doce</h2>

    <div class="doces">

      <button onclick="selecionarDoce(this, 'Sorvete', 6)">
        <img src="assets/doce-a.png">
        <span>R$ 6</span>
      </button>

      <button onclick="selecionarDoce(this,'Bolo',7)">
        <img src="assets/doce-b.png">
        <span>R$ 7</span>
      </button>

      <button onclick="selecionarDoce(this,'Cupcake',8)">
        <img src="assets/doce-c.png">
        <span>R$ 8</span>
      </button>

    </div>

    <h2 class="subtitulo">Inserir moedas</h2>

    <div class="money">

      <button onclick="inserir(this,1)">
        <img src="assets/coin.png"> R$ 1
      </button>

      <button onclick="inserir(this,2)">
        <img src="assets/coin.png"> R$ 2
      </button>

      <button onclick="inserir(this,5)">
        <img src="assets/coin.png"> R$ 5
      </button>

    </div>

    <p class="credito">
      💰 Crédito: R$ <span id="credito">0</span>
    </p>

    <div class="barra">
      <div id="progresso"></div>
    </div>

    <button id="comprarBtn" disabled onclick="comprar()">COMPRAR</button>
    <button class="secundario" onclick="remover()">CANCELAR</button>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <p id="modal-text"></p>
      <button onclick="fecharModal()">OK</button>
    </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
